name: BTC Signal Check

on:
  schedule:
    # 每小时第5分钟运行（避开整点高峰）
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '发送测试推送（验证 ntfy 配置）'
        type: boolean
        default: false

permissions:
  contents: write  # 需要写权限来提交 state.json

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          # 使用 token 以便后续 push 能触发
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTC signal check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python btc_signal.py --test
          else
            python btc_signal.py
          fi

      - name: Persist state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只在 state.json 存在且有变化时才提交
          if [ ! -f state.json ]; then
            echo "No state file, skip commit"
          elif git add state.json && ! git diff --cached --quiet -- state.json; then
            git commit -m "bot: update position state"
            git push
          else
            echo "No state change, skip commit"
          fi
